<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍽️ Restaurant Management System</h1>

<div class="container">

<h2>Add Order</h2>

<form id="orderForm">

<input type="hidden" id="orderId">

<label>Item Name</label>
<input type="text" id="name" required>

<label>Price</label>
<input type="number" id="price" required>

<label>Quantity</label>
<input type="number" id="qty" required>

<label>Category</label>
<select id="category">
<option>Food</option>
<option>Drinks</option>
<option>Dessert</option>
</select>

<button type="submit">Save Order</button>

</form>

</div>

<h2>Orders List</h2>

<input type="text" id="search" placeholder="Search item..." onkeyup="displayOrders()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Qty</th>
<th>Category</th>
<th>Total</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="orderTable"></tbody>

</table>

<h2>Total Bill: ৳ <span id="totalBill">0</span></h2>

<script src="script.js"></script>

</body>
</html>
